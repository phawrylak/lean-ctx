<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'nonce-{{nonce}}'; script-src 'nonce-{{nonce}}';"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style nonce="{{nonce}}">
    :root {
      --radius: 4px;
      --gap: 8px;
      --gap-sm: 4px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size);
      color: var(--vscode-foreground);
      background: var(--vscode-sideBar-background);
      line-height: 1.4;
      padding: 0;
      overflow-x: hidden;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--vscode-panel-border);
      background: var(--vscode-sideBar-background);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .tab {
      flex: 1;
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--vscode-foreground);
      opacity: 0.6;
      border-bottom: 2px solid transparent;
      transition: opacity 0.15s, border-color 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab:hover {
      opacity: 0.85;
    }

    .tab.active {
      opacity: 1;
      border-bottom-color: var(--vscode-focusBorder);
      color: var(--vscode-foreground);
    }

    /* ── Panels ── */
    .panel {
      display: none;
      padding: 12px;
    }

    .panel.active {
      display: block;
    }

    /* ── Stats panel ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      margin-bottom: 12px;
    }

    .stat-card {
      background: var(--vscode-editor-background);
      border: 1px solid var(--vscode-panel-border);
      border-radius: var(--radius);
      padding: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--vscode-textLink-foreground);
      font-variant-numeric: tabular-nums;
    }

    .stat-value.highlight {
      color: var(--vscode-charts-green);
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.7;
      margin-top: 2px;
    }

    .stat-card.wide {
      grid-column: span 2;
    }

    /* ── Version badge ── */
    .version-badge {
      text-align: center;
      font-size: 10px;
      opacity: 0.5;
      padding: 8px 0;
    }

    /* ── Knowledge panel ── */
    .fact-list {
      list-style: none;
    }

    .fact-item {
      background: var(--vscode-editor-background);
      border: 1px solid var(--vscode-panel-border);
      border-radius: var(--radius);
      padding: 8px 10px;
      margin-bottom: var(--gap-sm);
    }

    .fact-category {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 1px 6px;
      border-radius: 2px;
      margin-bottom: 4px;
    }

    .fact-category.decision {
      background: var(--vscode-charts-blue);
      color: #fff;
    }
    .fact-category.blocker {
      background: var(--vscode-charts-red);
      color: #fff;
    }
    .fact-category.discovery {
      background: var(--vscode-charts-green);
      color: #fff;
    }
    .fact-category.progress {
      background: var(--vscode-charts-yellow);
      color: #000;
    }
    .fact-category.insight {
      background: var(--vscode-charts-purple);
      color: #fff;
    }

    .fact-content {
      font-size: 12px;
      line-height: 1.5;
    }

    .fact-time {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 2px;
    }

    /* ── Repo-map panel ── */
    .repomap-list {
      list-style: none;
    }

    .repomap-item {
      background: var(--vscode-editor-background);
      border: 1px solid var(--vscode-panel-border);
      border-radius: var(--radius);
      padding: 6px 10px;
      margin-bottom: var(--gap-sm);
      cursor: pointer;
      transition: background 0.1s;
    }

    .repomap-item:hover {
      background: var(--vscode-list-hoverBackground);
    }

    .repomap-path {
      font-family: var(--vscode-editor-font-family);
      font-size: 12px;
      color: var(--vscode-textLink-foreground);
      word-break: break-all;
    }

    .repomap-symbols {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    .repomap-rank {
      float: right;
      font-size: 10px;
      opacity: 0.5;
      font-variant-numeric: tabular-nums;
    }

    /* ── Search panel ── */
    .search-box {
      display: flex;
      gap: var(--gap-sm);
      margin-bottom: 12px;
    }

    .search-input {
      flex: 1;
      padding: 6px 8px;
      font-size: 12px;
      font-family: var(--vscode-font-family);
      color: var(--vscode-input-foreground);
      background: var(--vscode-input-background);
      border: 1px solid var(--vscode-input-border, var(--vscode-panel-border));
      border-radius: var(--radius);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--vscode-focusBorder);
    }

    .search-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-family: var(--vscode-font-family);
      color: var(--vscode-button-foreground);
      background: var(--vscode-button-background);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      white-space: nowrap;
    }

    .search-btn:hover {
      background: var(--vscode-button-hoverBackground);
    }

    .search-result {
      background: var(--vscode-editor-background);
      border: 1px solid var(--vscode-panel-border);
      border-radius: var(--radius);
      padding: 8px 10px;
      margin-bottom: var(--gap-sm);
      cursor: pointer;
      transition: background 0.1s;
    }

    .search-result:hover {
      background: var(--vscode-list-hoverBackground);
    }

    .search-file {
      font-family: var(--vscode-editor-font-family);
      font-size: 12px;
      color: var(--vscode-textLink-foreground);
    }

    .search-line {
      font-size: 10px;
      opacity: 0.5;
    }

    .search-content {
      font-family: var(--vscode-editor-font-family);
      font-size: 11px;
      margin-top: 4px;
      white-space: pre-wrap;
      opacity: 0.85;
    }

    .search-score {
      float: right;
      font-size: 10px;
      opacity: 0.4;
    }

    /* ── Common ── */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      opacity: 0.5;
      font-size: 12px;
    }

    .empty-state .icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .loading {
      text-align: center;
      padding: 24px;
      opacity: 0.5;
    }

    .loading::after {
      content: "";
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--vscode-foreground);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .section-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.6;
      margin-bottom: var(--gap);
    }
  </style>
</head>
<body>
  <div class="tab-bar">
    <button class="tab active" data-tab="stats">Stats</button>
    <button class="tab" data-tab="knowledge">Knowledge</button>
    <button class="tab" data-tab="repomap">Repo Map</button>
    <button class="tab" data-tab="search">Search</button>
  </div>

  <!-- Stats -->
  <div id="panel-stats" class="panel active">
    <div class="stats-grid">
      <div class="stat-card wide">
        <div class="stat-value highlight" id="tokens-saved">—</div>
        <div class="stat-label">Tokens Saved</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-reads">—</div>
        <div class="stat-label">Reads</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-searches">—</div>
        <div class="stat-label">Searches</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-shells">—</div>
        <div class="stat-label">Shells</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="files-touched">—</div>
        <div class="stat-label">Files</div>
      </div>
    </div>
    <div class="version-badge" id="version-info">lean-ctx</div>
  </div>

  <!-- Knowledge -->
  <div id="panel-knowledge" class="panel">
    <div id="knowledge-content">
      <div class="loading">Loading knowledge</div>
    </div>
  </div>

  <!-- Repo Map -->
  <div id="panel-repomap" class="panel">
    <div id="repomap-content">
      <div class="loading">Loading repo map</div>
    </div>
  </div>

  <!-- Search -->
  <div id="panel-search" class="panel">
    <div class="search-box">
      <input
        class="search-input"
        id="search-input"
        type="text"
        placeholder="Semantic search…"
      />
      <button class="search-btn" id="search-btn">Search</button>
    </div>
    <div id="search-results">
      <div class="empty-state">
        <div class="icon">&#128269;</div>
        Enter a query to search your codebase
      </div>
    </div>
  </div>

  <script nonce="{{nonce}}">
    const vscode = acquireVsCodeApi();

    /* ── Tab switching ── */
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        const target = tab.getAttribute("data-tab");
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".panel")
          .forEach((p) => p.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("panel-" + target).classList.add("active");
        vscode.postMessage({ type: "loadTab", tab: target });
      });
    });

    /* ── Search ── */
    document.getElementById("search-btn").addEventListener("click", () => {
      const query = document.getElementById("search-input").value.trim();
      if (query) {
        vscode.postMessage({ type: "search", query });
      }
    });

    document
      .getElementById("search-input")
      .addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const query = e.target.value.trim();
          if (query) {
            vscode.postMessage({ type: "search", query });
          }
        }
      });

    /* ── Format numbers ── */
    function formatNumber(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
      if (n >= 1_000) return (n / 1_000).toFixed(1) + "K";
      return String(n);
    }

    /* ── Render functions ── */
    function renderStats(data) {
      document.getElementById("tokens-saved").textContent = formatNumber(
        data.tokensSaved
      );
      document.getElementById("total-reads").textContent = formatNumber(
        data.totalReads
      );
      document.getElementById("total-searches").textContent = formatNumber(
        data.totalSearches
      );
      document.getElementById("total-shells").textContent = formatNumber(
        data.totalShells
      );
      document.getElementById("files-touched").textContent = formatNumber(
        data.filesTouched
      );
    }

    function renderKnowledge(facts) {
      const container = document.getElementById("knowledge-content");
      if (!facts.length) {
        container.innerHTML =
          '<div class="empty-state"><div class="icon">&#128218;</div>No knowledge facts in current session</div>';
        return;
      }
      let html = '<ul class="fact-list">';
      for (const fact of facts) {
        const catClass = fact.category.toLowerCase();
        const time = fact.timestamp
          ? '<div class="fact-time">' + escapeHtml(fact.timestamp) + "</div>"
          : "";
        html +=
          '<li class="fact-item">' +
          '<span class="fact-category ' + catClass + '">' +
          escapeHtml(fact.category) +
          "</span>" +
          '<div class="fact-content">' + escapeHtml(fact.content) + "</div>" +
          time +
          "</li>";
      }
      html += "</ul>";
      container.innerHTML = html;
    }

    function renderRepoMap(entries) {
      const container = document.getElementById("repomap-content");
      if (!entries.length) {
        container.innerHTML =
          '<div class="empty-state"><div class="icon">&#128506;</div>No repo map data available</div>';
        return;
      }
      let html = '<ul class="repomap-list">';
      for (const entry of entries) {
        const symbols = entry.symbols.length
          ? entry.symbols.join(", ")
          : "—";
        html +=
          '<li class="repomap-item" data-path="' + escapeAttr(entry.path) + '">' +
          '<span class="repomap-rank">#' + entry.rank + "</span>" +
          '<div class="repomap-path">' + escapeHtml(entry.path) + "</div>" +
          '<div class="repomap-symbols">' + escapeHtml(symbols) + "</div>" +
          "</li>";
      }
      html += "</ul>";
      container.innerHTML = html;

      container.querySelectorAll(".repomap-item").forEach((item) => {
        item.addEventListener("click", () => {
          vscode.postMessage({
            type: "openFile",
            query: item.getAttribute("data-path"),
          });
        });
      });
    }

    function renderSearchResults(results) {
      const container = document.getElementById("search-results");
      if (!results.length) {
        container.innerHTML =
          '<div class="empty-state"><div class="icon">&#128528;</div>No results found</div>';
        return;
      }
      let html = "";
      for (const r of results) {
        const score = r.score != null
          ? '<span class="search-score">' + r.score.toFixed(2) + "</span>"
          : "";
        html +=
          '<div class="search-result" data-path="' + escapeAttr(r.file) + '">' +
          score +
          '<div class="search-file">' + escapeHtml(r.file) + "</div>" +
          '<div class="search-line">Line ' + r.line + "</div>" +
          '<div class="search-content">' + escapeHtml(r.content) + "</div>" +
          "</div>";
      }
      container.innerHTML = html;

      container.querySelectorAll(".search-result").forEach((item) => {
        item.addEventListener("click", () => {
          vscode.postMessage({
            type: "openFile",
            query: item.getAttribute("data-path"),
          });
        });
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return str.replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    /* ── Message handler ── */
    window.addEventListener("message", (event) => {
      const msg = event.data;
      switch (msg.type) {
        case "stats":
          renderStats(msg.data);
          break;
        case "version":
          document.getElementById("version-info").textContent =
            "lean-ctx v" + msg.data;
          break;
        case "knowledge":
          renderKnowledge(msg.data);
          break;
        case "repomap":
          renderRepoMap(msg.data);
          break;
        case "searchLoading":
          document.getElementById("search-results").innerHTML =
            '<div class="loading">Searching</div>';
          break;
        case "searchResults":
          renderSearchResults(msg.data);
          break;
        case "switchTab": {
          const target = msg.tab;
          document
            .querySelectorAll(".tab")
            .forEach((t) => t.classList.remove("active"));
          document
            .querySelectorAll(".panel")
            .forEach((p) => p.classList.remove("active"));
          const tabEl = document.querySelector('[data-tab="' + target + '"]');
          if (tabEl) tabEl.classList.add("active");
          const panelEl = document.getElementById("panel-" + target);
          if (panelEl) panelEl.classList.add("active");
          break;
        }
      }
    });

    vscode.postMessage({ type: "ready" });
  </script>
</body>
</html>
